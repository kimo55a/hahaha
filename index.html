<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Keypad Unlock</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            font-family: Arial;
            color: white;
            overflow: hidden;
        }

        /* الكيباد */
        .box {
            background: #111;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            width: 260px;
            box-shadow: 0 0 20px cyan;
        }

        h3 {
            margin-bottom: 5px;
            color: cyan;
        }

        /* التلميح */
        .hint {
            font-size: 12px;
            color: gray;
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            font-size: 22px;
            text-align: center;
            margin-bottom: 10px;
            background: black;
            color: cyan;
            border: 1px solid cyan;
            letter-spacing: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }

        button {
            padding: 12px;
            font-size: 18px;
            background: black;
            color: cyan;
            border: 1px solid cyan;
            cursor: pointer;
        }

            button:active {
                transform: scale(0.9);
            }

        /* شاشة الصورة */
        #winScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: none;
            background: black;
        }

            #winScreen img {
                width: 100vw;
                height: 100vh;
                object-fit: contain;
                background: black;
            }
    </style>
</head>

<body>

    <!-- Keypad -->
    <div class="box" id="panel">
        <h3>ENTER CODE</h3>

        <!-- 🔥 التلميح -->
        <div class="hint">Hint: رؤية السعودية</div>

        <input id="display" disabled>

        <div class="grid">
            <button onclick="press(1)">1</button>
            <button onclick="press(2)">2</button>
            <button onclick="press(3)">3</button>

            <button onclick="press(4)">4</button>
            <button onclick="press(5)">5</button>
            <button onclick="press(6)">6</button>

            <button onclick="press(7)">7</button>
            <button onclick="press(8)">8</button>
            <button onclick="press(9)">9</button>

            <button onclick="clearCode()">C</button>
            <button onclick="press(0)">0</button>
            <button onclick="check()">OK</button>
        </div>
    </div>

    <!-- الصورة -->
    <div id="winScreen">
        <img src="https://i.ibb.co/G3rhLDzW/0acbc5a4073a6afdbba4d06a7e671ec0.jpg">
    </div>

    <script>
        let code = "";

        function press(n) {
            if (code.length < 4) {
                code += n;
                document.getElementById("display").value = code;
            }
        }

        function clearCode() {
            code = "";
            document.getElementById("display").value = "";
        }

        function check() {
            if (code === "2030") {
                document.getElementById("panel").style.display = "none";
                document.getElementById("winScreen").style.display = "block";
            } else {
                code = "";
                document.getElementById("display").value = "";
                alert("ACCESS DENIED");
            }
        }
    </script>

</body>
</html>
